<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <style>
    .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #334155; }
    .label { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .small { font: 400 19px Arial, Helvetica, sans-serif; fill: #334155; }
    .tiny { font: 400 16px Arial, Helvetica, sans-serif; fill: #334155; }
    .box { stroke: #94a3b8; stroke-width: 2.5; rx: 22; ry: 22; }
    .arrow { stroke: #64748b; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    .line { stroke: #64748b; stroke-width: 3.2; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#64748b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <text x="800" y="70" class="title" text-anchor="middle">Fig-004 Structural Intelligence Lifecycle</text>
  <rect x="610" y="85" width="380" height="130" fill="#dbeafe" class="box" filter="url(#shadow)"/>
  <text x="800.0" y="123" class="label" text-anchor="middle">Structure</text>
  <text x="800.0" y="157" class="small" text-anchor="middle">CGCCC</text>
  <text x="800.0" y="183" class="small" text-anchor="middle">System understanding</text>
  <rect x="990" y="365" width="380" height="130" fill="#dcfce7" class="box" filter="url(#shadow)"/>
  <text x="1180.0" y="403" class="label" text-anchor="middle">Decision</text>
  <text x="1180.0" y="437" class="small" text-anchor="middle">PDS / ASI</text>
  <text x="1180.0" y="463" class="small" text-anchor="middle">Policy governance</text>
  <rect x="610" y="645" width="380" height="130" fill="#ede9fe" class="box" filter="url(#shadow)"/>
  <text x="800.0" y="683" class="label" text-anchor="middle">Trajectory</text>
  <text x="800.0" y="717" class="small" text-anchor="middle">FTI</text>
  <text x="800.0" y="743" class="small" text-anchor="middle">Feasible evolution</text>
  <rect x="230" y="365" width="380" height="130" fill="#fef3c7" class="box" filter="url(#shadow)"/>
  <text x="420.0" y="403" class="label" text-anchor="middle">New Structure</text>
  <text x="420.0" y="437" class="small" text-anchor="middle">System Transformation</text>
  <text x="420.0" y="463" class="small" text-anchor="middle">Updated graph and memory</text>
  <path d="M980,190 L1060,370" class="arrow"/>
  <path d="M1120,560 L930,670" class="arrow"/>
  <path d="M620,710 L480,560" class="arrow"/>
  <path d="M470,360 L650,220" class="arrow"/>
  <circle cx="800" cy="430" r="110" fill="#ffffff" stroke="#94a3b8" stroke-width="3" filter="url(#shadow)"/>
  <text x="800" y="415" class="label" text-anchor="middle">SI Cycle</text>
  <text x="800" y="450" class="small" text-anchor="middle">structure → decision</text>
  <text x="800" y="478" class="small" text-anchor="middle">→ trajectory → evolution</text>
  <text x="800" y="955" class="tiny" text-anchor="middle">Figure 4. Structural Intelligence links structure understanding, governed decisions, trajectory evolution, and new structures.</text>
</svg>
