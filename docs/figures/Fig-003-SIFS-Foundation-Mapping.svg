  <path d="M480,264 L640,452" class="arrow"/>
  <path d="M480,349 L640,452" class="arrow"/>
  <path d="M480,434 L640,452" class="arrow"/>
  <path d="M480,519 L640,452" class="arrow"/>
  <path d="M480,604 L640,452" class="arrow"/>
  <path d="M480,689 L640,452" class="arrow"/>
  <path d="M480,774 L640,452" class="arrow"/>
  <path d="M960,452 L1120,277" class="arrow"/>
  <path d="M960,452 L1120,457" class="arrow"/>
  <path d="M960,452 L1120,637" class="arrow"/>
  <text x="800" y="955" class="tiny" text-anchor="middle">Figure 3. SIFS acts as a shared infrastructure connecting foundation components to all frontier directions.</text>
