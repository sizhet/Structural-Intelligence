  <text x="285.0" y="358" class="small" text-anchor="middle">ASB</text>
  <rect x="90" y="405" width="390" height="58" fill="#ffffff" class="box" filter="url(#shadow)"/>
  <text x="285.0" y="443" class="small" text-anchor="middle">Differential Tree</text>
  <rect x="90" y="490" width="390" height="58" fill="#ffffff" class="box" filter="url(#shadow)"/>
  <text x="285.0" y="528" class="small" text-anchor="middle">MDT / EDT</text>
  <rect x="90" y="575" width="390" height="58" fill="#ffffff" class="box" filter="url(#shadow)"/>
  <text x="285.0" y="613" class="small" text-anchor="middle">2-Phases Search</text>
  <rect x="90" y="660" width="390" height="58" fill="#ffffff" class="box" filter="url(#shadow)"/>
  <text x="285.0" y="698" class="small" text-anchor="middle">ELM</text>
  <rect x="90" y="745" width="390" height="58" fill="#ffffff" class="box" filter="url(#shadow)"/>
  <text x="285.0" y="783" class="small" text-anchor="middle">Structural Similarity</text>
  <rect x="640" y="380" width="320" height="145" fill="#fef3c7" class="box" filter="url(#shadow)"/>
  <text x="800.0" y="418" class="label" text-anchor="middle">SIFS</text>
  <text x="800.0" y="452" class="small" text-anchor="middle">Shared Structural</text>
  <text x="800.0" y="478" class="small" text-anchor="middle">Infrastructure</text>
  <rect x="1120" y="230" width="360" height="95" fill="#dbeafe" class="box" filter="url(#shadow)"/>
  <text x="1300.0" y="268" class="label" text-anchor="middle">CGCCC</text>
  <text x="1300.0" y="302" class="small" text-anchor="middle">System SI</text>
  <rect x="1120" y="410" width="360" height="95" fill="#dcfce7" class="box" filter="url(#shadow)"/>
  <text x="1300.0" y="448" class="label" text-anchor="middle">PDS / ASI</text>
  <text x="1300.0" y="482" class="small" text-anchor="middle">Decision SI</text>
  <rect x="1120" y="590" width="360" height="95" fill="#ede9fe" class="box" filter="url(#shadow)"/>
  <text x="1300.0" y="628" class="label" text-anchor="middle">FTI</text>
  <text x="1300.0" y="662" class="small" text-anchor="middle">Trajectory SI</text>
