<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <style>
    .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #334155; }
    .label { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .small { font: 400 19px Arial, Helvetica, sans-serif; fill: #334155; }
    .tiny { font: 400 16px Arial, Helvetica, sans-serif; fill: #334155; }
    .box { stroke: #94a3b8; stroke-width: 2.5; rx: 22; ry: 22; }
    .arrow { stroke: #64748b; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    .line { stroke: #64748b; stroke-width: 3.2; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#64748b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <text x="800" y="70" class="title" text-anchor="middle">Fig-002 The Structural Intelligence Frontier Triangle</text>
  <path d="M800,180 L320,720 L1280,720 Z" fill="none" stroke="#64748b" stroke-width="5"/>
  <rect x="590" y="130" width="420" height="115" fill="#dbeafe" class="box" filter="url(#shadow)"/>
  <text x="800.0" y="168" class="label" text-anchor="middle">CGCCC</text>
  <text x="800.0" y="202" class="small" text-anchor="middle">System SI</text>
  <text x="800.0" y="228" class="small" text-anchor="middle">What exists?</text>
  <rect x="105" y="685" width="430" height="125" fill="#dcfce7" class="box" filter="url(#shadow)"/>
  <text x="320.0" y="723" class="label" text-anchor="middle">PDS / ASI</text>
  <text x="320.0" y="757" class="small" text-anchor="middle">Decision SI</text>
  <text x="320.0" y="783" class="small" text-anchor="middle">What should be done?</text>
  <rect x="1065" y="685" width="430" height="125" fill="#ede9fe" class="box" filter="url(#shadow)"/>
  <text x="1280.0" y="723" class="label" text-anchor="middle">FTI</text>
  <text x="1280.0" y="757" class="small" text-anchor="middle">Trajectory SI</text>
  <text x="1280.0" y="783" class="small" text-anchor="middle">How can change occur safely?</text>
  <circle cx="800" cy="540" r="145" fill="#ffffff" stroke="#94a3b8" stroke-width="3" filter="url(#shadow)"/>
  <text x="800" y="515" class="label" text-anchor="middle">Structural</text>
  <text x="800" y="548" class="label" text-anchor="middle">Intelligence</text>
  <text x="800" y="585" class="small" text-anchor="middle">Structure · Decision · Evolution</text>
  <text x="505" y="425" class="small" text-anchor="middle" transform="rotate(-48 505 425)">Structure Understanding</text>
  <text x="1095" y="425" class="small" text-anchor="middle" transform="rotate(48 1095 425)">Trajectory Guidance</text>
  <text x="800" y="780" class="small" text-anchor="middle">Decision Governance</text>
  <text x="800" y="955" class="tiny" text-anchor="middle">Figure 2. CGCCC explains systems, PDS governs decisions, and FTI explains evolution.</text>
</svg>
